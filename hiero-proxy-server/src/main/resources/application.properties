server.port=${SERVER_PORT:8080}
spring.application.name=hiero-proxy-server
spring.main.allow-bean-definition-overriding=true

# Load environment variables from a .env file if it exists
spring.config.import=optional:file:.env[.properties],optional:file:../.env[.properties]

# Hedera Network Configuration (developers will provide these in their .env file)
spring.hiero.accountId=${HEDERA_ACCOUNT_ID:0.0.123}
spring.hiero.privateKey=${HEDERA_PRIVATE_KEY:302e020100300506032b657004220420d39413bc03867c293cf5975569429cf29759c878950c44186419e4871e9a2638}
spring.hiero.network.name=${HEDERA_NETWORK:hedera-testnet}
spring.hiero.mirrorNode.endpoint=${HEDERA_MIRROR_NODE:testnet.mirrornode.hedera.com:443}

# Preserve spec path order — the pathOrderCustomizer rebuilds paths in workflow order.
# Do not set operationsSorter here; the SwaggerUiConfigParameters bean disables it programmatically.
springdoc.swagger-ui.path=/swagger-ui.html
